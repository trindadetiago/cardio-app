# UC05/UC06 — novos exames (glicemia capilar, ureia, CPK) são preenchíveis na visita
# e aparecem como métricas na evolução do paciente.
appId: com.anonymous.cardio-remoto
---
- runFlow: ../flows/_login.yaml
- runFlow: ../flows/_cadastro.yaml
- tapOn: { id: 'paciente-row-0' }
- extendedWaitUntil: { visible: { id: 'btn-nova-visita' }, timeout: 30000 }
- tapOn: { id: 'btn-nova-visita' }
- extendedWaitUntil: { visible: { id: 'visita-paSistolica' }, timeout: 30000 }
# Glicemia capilar (sinal vital novo)
- scrollUntilVisible: { element: { id: 'visita-glicemiaCapilar' }, direction: DOWN }
- tapOn: { id: 'visita-glicemiaCapilar' }
- inputText: '110'
- swipe: { start: '50%,58%', end: '50%,44%' }
# Ureia (exame laboratorial novo)
- scrollUntilVisible: { element: { id: 'visita-ureia' }, direction: DOWN }
- tapOn: { id: 'visita-ureia' }
- inputText: '35'
- swipe: { start: '50%,58%', end: '50%,44%' }
# CPK (exame laboratorial novo)
- scrollUntilVisible: { element: { id: 'visita-cpk' }, direction: DOWN }
- tapOn: { id: 'visita-cpk' }
- inputText: '120'
- scrollUntilVisible: { element: { id: 'btn-salvar-visita' }, direction: DOWN }
- tapOn: { id: 'btn-salvar-visita' }
- extendedWaitUntil: { visible: { id: 'detalhe-risco' }, timeout: 30000 }
# Evolução exibe as novas métricas
- tapOn: { id: 'btn-evolucao' }
- extendedWaitUntil: { visible: { id: 'metrica-glicemiaCapilar' }, timeout: 30000 }
- assertVisible: { id: 'metrica-ureia' }
- assertVisible: { id: 'metrica-cpk' }
