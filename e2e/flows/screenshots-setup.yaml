# Popula o app com dados realistas para capturas (não é teste).
# Ana = Controlado (verde), Maria = Moderado (3 visitas, evolução rica), José = Grave (vermelho).
# Após digitar a data, um swipe dispensa o teclado (keyboardDismissMode on-drag) para
# que os campos de PA recebam foco corretamente.
appId: com.anonymous.cardio-remoto
---
- runFlow: _login.yaml

# ===================== Ana Beatriz Costa (Controlado) =====================
- tapOn: { id: 'fab-novo-paciente' }
- extendedWaitUntil: { visible: { id: 'input-cpf' }, timeout: 30000 }
- tapOn: { id: 'input-cpf' }
- inputText: '11144477735'
- tapOn: { id: 'input-nome' }
- inputText: 'Ana Beatriz Costa'
- tapOn: { id: 'input-nascimento' }
- inputText: '22091985'
- tapOn: { id: 'sexo-feminino' }
# Fatores de risco categóricos (dispensa teclado antes de tocar nas pills)
- swipe: { start: '50%,45%', end: '50%,72%' }
- scrollUntilVisible: { element: { id: 'tabagismo-nao_fumante' }, direction: DOWN }
- tapOn: { id: 'tabagismo-nao_fumante' }
- tapOn: { id: 'atividade-regularmente' }
- scrollUntilVisible: { element: { id: 'btn-salvar-paciente' }, direction: DOWN }
- tapOn: { id: 'btn-salvar-paciente' }
- extendedWaitUntil: { visible: { id: 'paciente-row-0' }, timeout: 30000 }
- tapOn: { id: 'paciente-row-0' }
- extendedWaitUntil: { visible: { id: 'btn-nova-visita' }, timeout: 30000 }
- tapOn: { id: 'btn-nova-visita' }
- extendedWaitUntil: { visible: { id: 'visita-data' }, timeout: 30000 }
- tapOn: { id: 'visita-data' }
- eraseText: 10
- inputText: '15062026'
- swipe: { start: '50%,55%', end: '50%,42%' }
- tapOn: { id: 'visita-paSistolica' }
- inputText: '118'
- tapOn: { id: 'visita-paDiastolica' }
- inputText: '76'
- scrollUntilVisible: { element: { id: 'visita-hba1c' }, direction: DOWN }
- tapOn: { id: 'visita-hba1c' }
- inputText: '5.6'
- scrollUntilVisible: { element: { id: 'visita-ldl' }, direction: DOWN }
- tapOn: { id: 'visita-ldl' }
- inputText: '104'
- scrollUntilVisible: { element: { id: 'btn-salvar-visita' }, direction: DOWN }
- tapOn: { id: 'btn-salvar-visita' }
- extendedWaitUntil: { visible: { id: 'detalhe-risco' }, timeout: 30000 }

