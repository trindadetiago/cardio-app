# Sincronização manual pelo Perfil (RF007 / UC07).
# A sync é automática; o botão no Perfil força um sync completo.
appId: com.anonymous.cardio-remoto
---
- tapOn: { id: 'tab-perfil' }
- extendedWaitUntil: { visible: { id: 'btn-sincronizar' }, timeout: 30000 }
- tapOn: { id: 'btn-sincronizar' }
# Deve concluir com sucesso (backend em execução durante o e2e).
- extendedWaitUntil: { visible: { id: 'sync-result' }, timeout: 30000 }
