# Cadastro de paciente (RF002 / UC02).
appId: com.anonymous.cardio-remoto
---
- tapOn:
    id: "fab-novo-paciente"
- extendedWaitUntil:
    visible:
      id: "input-cpf"
    timeout: 30000
- tapOn:
    id: "input-cpf"
- inputText: "52998224725"
- tapOn:
    id: "input-nome"
- inputText: "Paciente Teste E2E"
- tapOn:
    id: "input-nascimento"
- inputText: "15031990"
- tapOn:
    id: "sexo-masculino"
# O scroll (keyboardDismissMode on-drag) dispensa o teclado e revela o botão.
- scrollUntilVisible:
    element:
      id: "btn-salvar-paciente"
    direction: DOWN
- tapOn:
    id: "btn-salvar-paciente"
# Volta para a lista e o paciente aparece (1ª linha).
- extendedWaitUntil:
    visible:
      id: "paciente-row-0"
    timeout: 30000
